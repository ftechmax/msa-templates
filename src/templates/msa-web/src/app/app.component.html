<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side" [opened]="true" [class.mat-elevation-z4]="true" class="app-sidenav">
    <div class="sidenav-header">LOGO</div>
    <mat-nav-list>
      <mat-list-item routerLink="dashboard"> <mat-icon>dashboard</mat-icon><span>Dashboard</span></mat-list-item>
      <mat-list-item routerLink="example"><mat-icon>flood</mat-icon><span>Example</span></mat-list-item>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="sidenav-content-container">
    <mat-toolbar class="toolbar-container" color="primary">
      <button mat-icon-button (click)="sidenav.toggle()" matTooltip="Menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span>msa-web</span>
      <span class="toolbar-item-spacer"></span>
      <button mat-icon-button matTooltip="Notifications">
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button matTooltip="My Account" [matMenuTriggerFor]="userAccountMenu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userAccountMenu [overlapTrigger]="false" yPosition="below">
        <button mat-menu-item routerLink="#"><mat-icon>person</mat-icon><span>My Account</span></button>
        <button mat-menu-item routerLink="#"><mat-icon>settings</mat-icon><span>Settings</span></button>
        <button mat-menu-item routerLink="#"><mat-icon>help</mat-icon><span>Help</span></button>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="#"><mat-icon>exit_to_app</mat-icon>Logout</button>
      </mat-menu>
    </mat-toolbar>
    <div class="content-container">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
