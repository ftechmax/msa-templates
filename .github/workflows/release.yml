name: Release

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/**'
      - 'k8s/**'
      - 'generator.sh'
      - 'generator.ps1'
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: [ubuntu-latest]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'
          preferLatestVersion: true

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Run dotnet tests and coverage
        run: |-
          dotnet test ./src/templates/api/ApplicationName.Api.sln /p:CollectCoverage=true /p:CoverletOutputFormat=opencover
          dotnet test ./src/templates/worker/ApplicationName.Worker.sln /p:CollectCoverage=true /p:CoverletOutputFormat=opencover

      - name: Create package
        run: dotnet pack ./src/MSA.Templates.csproj -p:PackageVersion=${{ steps.gitversion.outputs.semVer }} -c Release

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Prepare generator artifacts
        run: |-
          mkdir -p dist
          sed -i "s/GENERATOR_VERSION=\"develop\"/GENERATOR_VERSION=\"${{ steps.gitversion.outputs.semVer }}\"/" generator.sh
          sed -i "s/\$GeneratorVersion = \"develop\"/\$GeneratorVersion = \"${{ steps.gitversion.outputs.semVer }}\"/" generator.ps1
          chmod +x generator.sh
          cp generator.sh generator.ps1 dist/

      - name: Publish package
        run: |-
          dotnet nuget push ./artifacts/*${{ steps.gitversion.outputs.semVer }}.nupkg --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.gitversion.outputs.semVer }}
          commit: 'main'
          name: Release ${{ steps.gitversion.outputs.semVer }}
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: 'dist/generator.sh,dist/generator.ps1'
