name: Release

on:
  push:
    branches:
      - 'main'
    paths:
      - 'templates/**'
      - 'k8s/**'
      - 'generator.sh'
      - 'generator.ps1'
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: [ubuntu-latest]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'
          preferLatestVersion: true

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Run dotnet tests and coverage
        run: |-
          dotnet test ./templates/api/ApplicationName.Api.sln /p:CollectCoverage=true /p:CoverletOutputFormat=opencover
          dotnet test ./templates/worker/ApplicationName.Worker.sln /p:CollectCoverage=true /p:CoverletOutputFormat=opencover

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Prepare release artifacts
        run: |-
          set -euo pipefail
          semver="${{ steps.gitversion.outputs.semVer }}"
          mkdir -p dist
          sed -i "s/GENERATOR_VERSION=\"develop\"/GENERATOR_VERSION=\"${semver}\"/" generator.sh
          sed -i "s/\$GeneratorVersion = \"develop\"/\$GeneratorVersion = \"${semver}\"/" generator.ps1
          chmod +x generator.sh

          staging="$(mktemp -d)/msa-templates"
          mkdir -p "$staging"
          cp generator.sh generator.ps1 "$staging/"
          cp -R templates k8s "$staging/"

          cp generator.sh generator.ps1 dist/
          (cd "$(dirname "$staging")" && zip -qr "$GITHUB_WORKSPACE/dist/msa-templates-v${semver}.zip" msa-templates)

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.gitversion.outputs.semVer }}
          commit: 'main'
          name: Release ${{ steps.gitversion.outputs.semVer }}
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: 'dist/generator.sh,dist/generator.ps1,dist/msa-templates-v*.zip'
