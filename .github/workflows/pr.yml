name: Pull request

on:
  merge_group:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  test-api:
    if: github.event.pull_request.draft == false
    name: Test api
    runs-on: [ubuntu-latest]
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test api
        run: dotnet test ./templates/api/ApplicationName.Api.sln

  test-worker:
    if: github.event.pull_request.draft == false
    name: Test worker
    runs-on: [ubuntu-latest]
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test worker
        run: dotnet test ./templates/worker/ApplicationName.Worker.sln

  test-web:
    if: github.event.pull_request.draft == false
    name: Test web
    runs-on: ubuntu-latest
    container:
      image: node:lts-alpine
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          cd ./templates/web
          npm ci

      # - name: Run Unit Tests
      #   run: npm run test

      - name: Build Application
        run: |
          cd ./templates/web
          npm run build
