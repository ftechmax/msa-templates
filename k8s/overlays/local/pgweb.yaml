---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: applicationname-pgweb
  labels:
    app: applicationname-pgweb
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: applicationname-pgweb
  template:
    metadata:
      labels:
        app: applicationname-pgweb
    spec:
      automountServiceAccountToken: false
      containers:
        - name: pgweb
          image: sosedoff/pgweb:0.17.0
          imagePullPolicy: IfNotPresent
          args:
            - --url=postgres://$(database_username):$(database_password)@applicationname-database:5432/applicationname_snake?sslmode=disable
            - --auth-user=$(database_username)
            - --auth-pass=$(database_password)
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - all
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - secretRef:
                name: applicationname-database
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 3
          resources:
            limits:
              memory: 64Mi
              cpu: 100m
            requests:
              memory: 16Mi
              cpu: 5m
---
apiVersion: v1
kind: Service
metadata:
  name: applicationname-pgweb
spec:
  selector:
    app: applicationname-pgweb
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8081
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: applicationname-pgweb
spec:
  parentRefs:
    - name: '{{GATEWAY_NAME}}'
      namespace: '{{GATEWAY_NAMESPACE}}'
  hostnames:
    - applicationname-pgweb.{{DOMAIN}}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: applicationname-pgweb
          port: 80
