---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: applicationname-web
spec:
  parentRefs:
    - name: '{{GATEWAY_NAME}}'
      namespace: '{{GATEWAY_NAMESPACE}}'
  hostnames:
    - applicationname.{{DOMAIN}}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: applicationname-web
          port: 80
