---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: applicationname-rabbitmq
spec:
  vhost: /
  userReference:
    name: applicationname-rabbitmq
  permissions:
    write: '.*'
    configure: '.*'
    read: '.*'
  rabbitmqClusterReference:
    name: rabbitmq
    namespace: {{RABBITMQ_CLUSTER_NAMESPACE}}
---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: applicationname-rabbitmq
spec:
  rabbitmqClusterReference:
    name: rabbitmq
    namespace: {{RABBITMQ_CLUSTER_NAMESPACE}}
  importCredentialsSecret:
    name: applicationname-rabbitmq
