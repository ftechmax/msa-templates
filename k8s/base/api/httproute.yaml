---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: applicationname-api
spec:
  parentRefs:
    - name: '{{GATEWAY_NAME}}'
      namespace: '{{GATEWAY_NAMESPACE}}'
  hostnames:
    - applicationname.{{DOMAIN}}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        - type: CORS
          cors:
            allowOrigins:
              - '*'
            allowMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowHeaders:
              - content-type
      backendRefs:
        - name: applicationname-api
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api-hub
      filters:
        - type: CORS
          cors:
            allowOrigins:
              - '*'
            allowMethods:
              - GET
              - POST
              - OPTIONS
            allowHeaders:
              - x-requested-with
              - x-signalr-user-agent
            allowCredentials: true
            maxAge: 86400
      backendRefs:
        - name: applicationname-api
          port: 80
