---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: applicationname-worker
  labels:
    app: applicationname-worker
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: applicationname-worker
  template:
    metadata:
      labels:
        app: applicationname-worker
      annotations:
        prometheus.io.scrape: 'true'
    spec:
      serviceAccountName: applicationname
      automountServiceAccountToken: false
      containers:
        - name: applicationname-worker
          image: applicationname-worker:latest
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 20000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - all
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: applicationname-database
          env:
            - name: rabbitmq__host
              value: {{RABBITMQ_HOST}}
            - name: rabbitmq__username
              valueFrom:
                secretKeyRef:
                  name: applicationname-rabbitmq
                  key: username
            - name: rabbitmq__password
              valueFrom:
                secretKeyRef:
                  name: applicationname-rabbitmq
                  key: password
            - name: postgres__connection-string
              value: 'Host=applicationname-database;Port=5432;Database=applicationname_snake;Username=$(database_username);Password=$(database_password)'
            - name: valkey__connection-string
              value: 'applicationname-cache:6379'
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
          resources:
            limits:
              memory: 100Mi
              cpu: 100m
            requests:
              memory: 30Mi
              cpu: 10m
